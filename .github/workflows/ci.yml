name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: python-tests
    runs-on: ubuntu-latest
    env:
      ML_JOB_SWARM_DB_PATH: /tmp/ml-job-swarm/jobs.db
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Prepare test database directory
        run: mkdir -p /tmp/ml-job-swarm
      - name: Run pytest
        run: uv run pytest -q

  postgres-tests:
    name: postgres-tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jobs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ML_JOB_SWARM_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jobs
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run Postgres integration tests
        run: uv run pytest tests/ -k "postgres or hosted_migration or hosted_cutover" -q

  macos-build:
    name: macos-build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build Swift app binary
        working-directory: macos/MLJobSwarm
        run: swift build -c release
      - name: Package signed app bundle
        run: |
          chmod +x scripts/*.sh
          APP_VERSION=0.0.0-ci INSTALL_DIR="/tmp/dist" ./scripts/build-macos-app.sh
      - name: Release smoke
        run: ./scripts/smoke-macos-release.sh "/tmp/dist/MLJobSwarm.app"

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build hosted Docker image
        run: docker build -t ml-job-swarm:ci .
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps for JWT smoke token
        run: uv sync --frozen
      - name: Hosted container smoke
        env:
          PREFLIGHT_JWT_SECRET: test-jwt-secret-for-hosted-auth-32b
        run: |
          chmod +x scripts/*.sh
          container_id="$(docker run -d --rm -p 18080:18080 \
            -e PORT=18080 \
            -e ML_JOB_SWARM_DATA_DIR=/data \
            -e SUPABASE_URL=https://example.supabase.co \
            -e SUPABASE_ANON_KEY=ci-anon-key \
            -e SUPABASE_JWT_SECRET="${PREFLIGHT_JWT_SECRET}" \
            -v /tmp/ml-job-swarm-docker:/data \
            ml-job-swarm:ci)"
          trap 'docker stop "${container_id}" >/dev/null 2>&1 || true' EXIT
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:18080/healthz >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          ./scripts/smoke-hosted.sh http://127.0.0.1:18080
          token="$(uv run python - <<'PY'
          import jwt, os, time
          secret = os.environ["PREFLIGHT_JWT_SECRET"]
          print(jwt.encode(
              {"sub": "ci-user", "aud": "authenticated", "exp": int(time.time()) + 3600},
              secret,
              algorithm="HS256",
          ))
          PY
          )"
          ./scripts/smoke-hosted.sh http://127.0.0.1:18080 "${token}"