name: Nightly seed audit

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-seed-audit
  cancel-in-progress: false

jobs:
  live-seed-audit:
    name: live-seed-audit
    runs-on: ubuntu-latest
    env:
      ML_JOB_SWARM_DB_PATH: /tmp/audit.db
      AUDIT_DB_PATH: /tmp/audit.db
      AUDIT_ARTIFACT_DIR: audit-artifact
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Prepare audit database
        run: |
          mkdir -p "${AUDIT_ARTIFACT_DIR}"
          uv run python - <<'PY'
          from pathlib import Path

          from ml_job_swarm.store import connect, init_db

          db_path = Path("/tmp/audit.db")
          conn = connect(db_path)
          init_db(conn)
          previous_run_id = conn.execute(
              "SELECT COALESCE(MAX(id), 0) FROM ingestion_runs"
          ).fetchone()[0]
          Path("/tmp/previous_run_id.txt").write_text(str(previous_run_id), encoding="utf-8")
          conn.close()
          PY

      - name: Run live public ATS refresh
        id: refresh
        continue-on-error: true
        run: |
          set -o pipefail
          uv run ml-job-swarm refresh \
            --public-ats \
            --db /tmp/audit.db \
            --seed data/seed_companies.json \
            | tee "${AUDIT_ARTIFACT_DIR}/refresh_summary.json"

      - name: Evaluate refresh audit metrics
        id: evaluate
        if: ${{ always() && steps.refresh.outcome != 'cancelled' }}
        run: uv run python scripts/seed_refresh_audit.py --evaluate-live --db /tmp/audit.db --refresh-summary audit-artifact/refresh_summary.json --previous-run-id "$(cat /tmp/previous_run_id.txt)" --output audit-artifact/nightly_seed_audit.json

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-seed-audit-${{ github.run_id }}
          path: audit-artifact/
          if-no-files-found: warn
