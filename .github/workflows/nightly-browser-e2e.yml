name: nightly-browser-e2e

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-smoke:
    name: browser-smoke
    runs-on: ubuntu-latest
    env:
      ML_JOB_SWARM_DB_PATH: /tmp/ml-job-swarm/browser-e2e.db
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Prepare test database directory
        run: mkdir -p /tmp/ml-job-swarm
      - name: Run live browser smoke
        run: |
          mkdir -p /tmp/ml-job-swarm-artifacts
          uv run --with uvicorn --with playwright python scripts/live_e2e_smoke.py \
            --artifact-dir /tmp/ml-job-swarm-artifacts \
            --browser-timeout-ms 120000
