name: Cloud Parity

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: cloud-parity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cloud-parity:
    name: cloud-parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run cloud parity check
        run: |
          chmod +x scripts/run-cloud-parity-check.sh
          ./scripts/run-cloud-parity-check.sh
      - name: Run cloud load test
        if: ${{ hashFiles('scripts/run-cloud-load-test.py') != '' }}
        run: uv run python scripts/run-cloud-load-test.py
